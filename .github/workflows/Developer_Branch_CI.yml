name: Developer_Branch_CI
on:
  workflow_call:
    inputs:
      service_name:
        type: string
        required: true

jobs:
  CI_Steps:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Unit Tests
        run: echo Unit Tests

      - name: Integration Tests
        run: echo Integration Tests

      - name: Code Quality
        shell: bash
        run: sonar-scanner -Dsonar.host.url=http://https://sonarqube.tsdevops25.online/ -Dsonar.login="${SONAR_USER}" -Dsonar.password="${SONAR_PASS}" -Dsonar.projectKey="${service_name}" -Dsonar.qualitygate.wait=true
        env:
          SONAR_USER: ${{ secrets.SONAR_USER }}
          SONAR_PASS: ${{ secrets.SONAR_PASS }}
          service_name: ${{ inputs.service_name }}




